<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
    <title>FWPP</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/icons/icon.svg">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="css/app.css">
  </head>
  <body>
    <a class="skip-link" href="#airport-list">Skip to airport list</a>

    <header class="app-header">
      <div>
        <p class="eyebrow">Fly Washington Passport Program</p>
        <h1>FWPP</h1>
      </div>
      <div class="header-actions">
        <span class="status-pill" id="network-status" aria-live="polite">Checking</span>
        <button class="icon-button" id="theme-toggle" type="button" aria-label="Switch theme" title="Switch theme">
          <span aria-hidden="true">◐</span>
        </button>
      </div>
    </header>

    <main class="app-layout">
      <section class="map-panel" aria-label="Airport map">
        <div class="map-toolbar">
          <div>
            <p class="eyebrow">Washington State</p>
            <h2>Airport Map</h2>
          </div>
          <div class="map-summary" id="map-summary"></div>
        </div>

        <div class="map-shell">
          <div class="leaflet-map" id="airport-map" aria-label="Zoomable airport map"></div>
        </div>
      </section>

      <aside class="side-panel" aria-label="Airport controls and details">
        <section class="control-section">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Dataset</p>
              <h2>Airports</h2>
            </div>
            <span class="version-pill" id="dataset-version">Loading</span>
          </div>

          <label class="search-field">
            <span>Search</span>
            <input id="airport-search" type="search" autocomplete="off" placeholder="Airport, FAA ID, region">
          </label>

          <div>
            <p class="field-label">Regions</p>
            <div class="region-filter" id="region-filter"></div>
          </div>
        </section>

        <section class="airport-detail" id="airport-detail" aria-live="polite">
          <p class="empty-state">Select an airport marker or list item to view stamp details.</p>
        </section>

        <section class="airport-list-section">
          <div class="section-heading compact">
            <h2>Airport List</h2>
            <span id="result-count"></span>
          </div>
          <div class="airport-list" id="airport-list"></div>
        </section>
      </aside>
    </main>

    <footer class="app-footer">
      <span>Offline-ready airport metadata after first load.</span>
      <span>Not for flight safety decisions.</span>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
