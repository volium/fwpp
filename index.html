<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
    <title>FWPP</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/icons/icon.svg">
    <link rel="stylesheet" href="css/app.css">
  </head>
  <body>
    <a class="skip-link" href="#airport-list">Skip to airport list</a>

    <header class="app-header">
      <div>
        <p class="eyebrow">Fly Washington Passport Program</p>
        <h1>FWPP</h1>
      </div>
      <div class="header-actions">
        <span class="status-pill" id="network-status" aria-live="polite">Checking</span>
        <button class="icon-button" id="theme-toggle" type="button" aria-label="Switch theme" title="Switch theme">
          <span aria-hidden="true">◐</span>
        </button>
      </div>
    </header>

    <main class="app-layout">
      <section class="map-panel" aria-label="Airport map">
        <div class="map-toolbar">
          <div>
            <p class="eyebrow">Washington State</p>
            <h2>Airport Map</h2>
          </div>
          <div class="map-summary" id="map-summary"></div>
        </div>

        <div class="map-shell">
          <div class="state-map" id="state-map">
            <svg class="state-outline" viewBox="0 0 1000 620" role="img" aria-labelledby="map-title map-desc">
              <title id="map-title">Simplified map of Washington State</title>
              <desc id="map-desc">Airport markers are positioned by latitude and longitude.</desc>
              <path class="state-fill" d="M86 90 L918 88 L938 354 L888 383 L879 431 L823 454 L808 508 L742 520 L716 568 L621 546 L548 570 L462 544 L381 566 L325 530 L230 542 L191 497 L139 481 L145 416 L106 378 L127 318 L90 268 Z"></path>
              <path class="coast-line" d="M86 90 L90 268 L127 318 L106 378 L145 416 L139 481 L191 497 L230 542"></path>
              <path class="cascade-line" d="M542 114 C523 176 559 223 534 283 C508 346 553 393 535 463 C526 498 538 532 548 570"></path>
              <path class="water-line" d="M206 123 C179 171 188 223 221 252 C246 276 240 314 204 347 C176 374 185 425 222 451"></path>
            </svg>
            <div class="marker-layer" id="marker-layer" aria-label="Airport markers"></div>
          </div>
        </div>
      </section>

      <aside class="side-panel" aria-label="Airport controls and details">
        <section class="control-section">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Dataset</p>
              <h2>Airports</h2>
            </div>
            <span class="version-pill" id="dataset-version">Loading</span>
          </div>

          <label class="search-field">
            <span>Search</span>
            <input id="airport-search" type="search" autocomplete="off" placeholder="Airport, FAA ID, region">
          </label>

          <div>
            <p class="field-label">Regions</p>
            <div class="region-filter" id="region-filter"></div>
          </div>
        </section>

        <section class="airport-detail" id="airport-detail" aria-live="polite">
          <p class="empty-state">Select an airport marker or list item to view stamp details.</p>
        </section>

        <section class="airport-list-section">
          <div class="section-heading compact">
            <h2>Airport List</h2>
            <span id="result-count"></span>
          </div>
          <div class="airport-list" id="airport-list"></div>
        </section>
      </aside>
    </main>

    <footer class="app-footer">
      <span>Offline-ready airport metadata after first load.</span>
      <span>Not for flight safety decisions.</span>
    </footer>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
